<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LawnApp"/>
<meta name="theme-color" content="#185FA5"/>
<title>LawnApp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--green:#0F6E56;--red:#A32D2D;--amber:#BA7517;--gray:#888780;
  --border:#E0DDD8;--bg:#F8F7F4;--card:#fff;
  --text:#1A1A18;--text2:#6B6966;--text3:#9E9B97;
  --info-bg:#E6F1FB;--green-bg:#EAF3DE;--red-bg:#FCEBEB;--amber-bg:#FAEEDA;
  --svc-lawncare:#3B6D11;--svc-treework:#854F0B;--svc-mulching:#5F5E5A;
  --svc-landscaping:#185FA5;--svc-maintenance:#BA7517;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:var(--text);font-size:16px}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--card);box-shadow:0 0 40px rgba(0,0,0,.08)}

/* SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
.screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 16px}

/* HEADER */
.hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--card);padding-top:calc(12px + var(--safe-top));flex-shrink:0}
.hdr-title{flex:1;font-size:17px;font-weight:600;color:var(--text)}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn-amber{background:none;border:0.5px solid var(--amber);color:var(--amber);border-radius:20px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
.btn-outline{background:none;border:0.5px solid var(--border);color:var(--text2);border-radius:10px;padding:11px;font-size:15px;cursor:pointer;width:100%;text-align:center}
.btn-danger{background:none;border:0.5px solid var(--red);color:var(--red);border-radius:10px;padding:11px;font-size:15px;cursor:pointer;width:100%;text-align:center;margin-top:8px}

/* BOTTOM NAV */
.bnav{display:flex;border-top:0.5px solid var(--border);background:var(--card);padding-bottom:var(--safe-bot);flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3)}
.bnav-btn.active{color:var(--blue)}
.bnav-icon{font-size:22px;line-height:1}

/* SUMMARY BAR */
.sum-bar{display:flex;gap:8px;padding:10px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.sum-pill{flex:1;background:var(--bg);border-radius:10px;padding:7px 6px;text-align:center}
.sum-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.sum-val{font-size:14px;font-weight:600;color:var(--text);margin-top:2px}
.sum-val.g{color:var(--green)}.sum-val.r{color:var(--red)}.sum-val.b{color:var(--blue)}

/* SECTION LABELS */
.slbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}
.divider{border:none;border-top:0.5px solid var(--border);margin:14px 0 4px}

/* JOB CARDS */
.jcard{background:var(--card);border:0.5px solid var(--border);border-left:3px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px}
.jcard.lawncare{border-left-color:var(--svc-lawncare)}
.jcard.treework{border-left-color:var(--svc-treework)}
.jcard.mulching{border-left-color:var(--svc-mulching)}
.jcard.landscaping{border-left-color:var(--svc-landscaping)}
.jcard.maintenance{border-left-color:var(--svc-maintenance)}
.jcard.done{opacity:.6}
.jcard.skipped{opacity:.65;border-left-style:dashed}
.jrow{display:flex;align-items:flex-start;gap:8px}
.jinfo{flex:1;min-width:0}
.jloc{font-size:14px;font-weight:600;color:var(--text)}
.jloc.skip{color:var(--gray)}
.badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--info-bg);color:var(--blue)}
.badge.done{background:var(--green-bg);color:var(--green)}
.badge.skip{background:#F1EFE8;color:var(--gray)}
.badge.paid{background:var(--green-bg);color:var(--green)}
.badge.unpaid{background:var(--amber-bg);color:var(--amber)}
.ptag{font-size:12px;font-weight:600;color:var(--blue)}
.etag{font-size:12px;color:var(--red)}
.jnote{font-size:12px;color:var(--text3);font-style:italic;margin-top:3px}
.exp-list{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.exp-row{display:flex;justify-content:space-between;font-size:12px;background:var(--bg);border-radius:6px;padding:4px 8px}
.card-btns{display:flex;flex-direction:row;gap:6px;flex-shrink:0;align-items:center}
.ck{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);flex-shrink:0}
.ck.on{background:var(--blue);border-color:var(--blue);color:#fff}
.icon-btn{width:34px;height:34px;border-radius:8px;border:0.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.drag-handle{width:28px;height:34px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--text3);font-size:16px;flex-shrink:0;touch-action:none}
.drag-handle:active{cursor:grabbing}
.jcard.dragging{opacity:.4;transform:scale(.98)}
.jcard.drag-over{border-top:2px solid var(--blue)}
.jloc-name{font-size:14px;font-weight:600;color:var(--text)}
.jloc-addr{font-size:12px;color:var(--text3);margin-top:1px}

/* MAINT CARDS */
.maint-card{background:var(--card);border:0.5px solid #EF9F27;border-left:3px solid var(--amber);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px}
.maint-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:3px}

/* MODAL / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;max-width:430px;margin:0 auto}
.sheet{background:var(--card);border-radius:24px 24px 0 0;padding:10px 20px calc(20px + var(--safe-bot));max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:6px auto 16px}
.sheet-title{font-size:17px;font-weight:600;margin-bottom:14px;color:var(--text)}
.fl{font-size:13px;color:var(--text2);margin-bottom:4px;margin-top:12px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:8px;
  font-size:15px;color:var(--text);background:var(--bg);outline:none;
  font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:52px}
.dollar-row{display:flex;align-items:center;background:var(--bg);border:0.5px solid var(--border);border-radius:8px;overflow:hidden}
.dollar-row span{padding:0 4px 0 12px;color:var(--text2);font-size:15px;flex-shrink:0}
.dollar-row input{border:none;background:none;padding-left:0;flex:1}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-save{flex:1;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{flex:1;background:none;border:0.5px solid var(--border);color:var(--text2);border-radius:10px;padding:12px;font-size:15px;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--text2)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.amber-on{background:var(--amber);border-color:var(--amber);color:#fff}
.profile-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pdivider{display:flex;align-items:center;gap:8px;margin:12px 0 4px}
.pdivider:before,.pdivider:after{content:'';flex:1;border-top:0.5px solid var(--border)}
.pdivider span{font-size:12px;color:var(--text3)}
.je-item{background:var(--bg);border-radius:8px;padding:8px;margin-bottom:6px}
.add-je-btn{border:0.5px dashed var(--border);border-radius:8px;width:100%;padding:8px;color:var(--blue);font-size:13px;cursor:pointer;background:none;margin-top:4px}

/* JOB ACTION SHEET */
.complete-btn{width:100%;border:none;border-radius:14px;padding:18px;font-size:18px;font-weight:700;cursor:pointer;color:#fff;margin-bottom:12px}
.move-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0 14px}
.move-day{display:flex;flex-direction:column;align-items:center;padding:8px 2px;border-radius:10px;cursor:pointer;border:0.5px solid var(--border)}
.move-day:active{background:var(--info-bg)}
.move-day .dn{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase}
.move-day .dd{font-size:16px;font-weight:600;color:var(--text)}
.next-week-btn{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;text-align:left;margin-bottom:8px;color:var(--text)}

/* WEEK STRIP */
.wk-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--card)}
.wk-nav-lbl{font-size:13px;color:var(--text2)}
.wk-btn{border:0.5px solid var(--border);background:none;border-radius:8px;padding:4px 10px;font-size:14px;cursor:pointer;color:var(--text)}
.wk-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:10px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--card)}
.dp{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:10px;cursor:pointer;border:0.5px solid transparent}
.dp.hj{background:var(--info-bg)}
.dp.sel{background:var(--blue)}
.dp-n{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase}
.dp-d{font-size:15px;font-weight:600;color:var(--text);margin-top:1px}
.dp-c{font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;min-height:13px}
.dp.hj .dp-n,.dp.hj .dp-d,.dp.hj .dp-c{color:var(--blue)}
.dp.sel .dp-n,.dp.sel .dp-d,.dp.sel .dp-c{color:#fff}

/* HISTORY */
.mnav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--card)}
.mnav-btn{border:0.5px solid var(--border);background:none;border-radius:8px;padding:5px 12px;font-size:16px;cursor:pointer}
.mnav-lbl{font-size:16px;font-weight:600}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:#F1EFE8;border-radius:14px;margin:12px 16px 0;flex-shrink:0}
.tile{background:var(--card);border-radius:10px;padding:10px 12px;border:0.5px solid transparent;cursor:pointer;position:relative}
.tile.click:hover{border-color:var(--blue)}
.tile.toggled{background:#F1EFE8}
.tile-l{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px;font-weight:600}
.tile-v{font-size:20px;font-weight:700}
.tile-v.g{color:var(--green)}.tile-v.r{color:var(--red)}.tile-v.b{color:var(--blue)}
.tile-s{font-size:11px;color:var(--text3);margin-top:2px}
.tog-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.tog-item{background:var(--card);border-radius:8px;padding:6px 8px;text-align:center}
.tog-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.tog-v{font-size:14px;font-weight:700;margin-top:2px}
.pnote{font-size:10px;color:var(--text3);text-align:center;padding:8px 0 4px}
.search-wrap{margin:10px 16px 0;position:relative;flex-shrink:0}
.search-inp{width:100%;padding:10px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:0.5px solid var(--border);border-radius:8px;margin-top:4px;z-index:10;max-height:180px;overflow-y:auto}
.ac-item{padding:12px 14px;font-size:14px;cursor:pointer;border-bottom:0.5px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--bg)}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.hist-date{font-size:14px;font-weight:600;color:var(--text)}
.hist-meta{font-size:11px;color:var(--text2);margin-top:2px}
.hist-outstanding{font-size:11px;color:var(--amber);margin-top:1px}
.hist-rev{font-size:13px;font-weight:600;color:var(--green)}
.banner{display:flex;justify-content:space-between;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.banner.out{background:var(--amber-bg)}
.banner.col{background:var(--green-bg)}
.info-box{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;margin-bottom:8px}
.info-row:last-child{margin-bottom:0}
.bdr-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--border)}
.bdr-row:last-child{border-bottom:none}
.cat-hdr{display:flex;justify-content:space-between;padding:10px 0 4px;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* DAY DONE MODAL */
.centered-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;max-width:430px;margin:0 auto}
.centered-card{background:var(--card);border-radius:20px;padding:28px 24px;width:100%;max-width:320px;text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.9}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;white-space:nowrap;pointer-events:none;max-width:430px}
</style>
</head>
<body>
<div id="app">

  <!-- SCHEDULE SCREEN -->
  <div class="screen active" id="scr-schedule">
    <div class="hdr">
      <button class="btn-amber" onclick="openMaintLog()">Maintenance</button>
      <div style="flex:1"></div>
      <button id="sync-dot" onclick="jbinApiKey?pullFromCloud():openSyncSettings()" title="Cloud sync" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 4px;line-height:1">☁️</button>
      <button class="btn-primary" onclick="openJobForm()">+ Add Job</button>
    </div>
    <div class="sum-bar" id="sum-bar"></div>
    <div class="screen-body" id="sched-body"></div>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen" id="scr-history">
    <div class="hdr"><div class="hdr-title">History</div><button onclick="openSyncSettings()" title="Cloud sync settings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 4px">⚙</button><button class="btn-primary" onclick="openExportSheet()" style="background:var(--green)">↑ Export</button></div>
    <div class="mnav">
      <button class="mnav-btn" onclick="histMO--;renderHistory()">‹</button>
      <span class="mnav-lbl" id="hist-month-lbl"></span>
      <button class="mnav-btn" onclick="if(histMO<0){histMO++;renderHistory()}">›</button>
    </div>
    <div id="tiles-wrap" style="flex-shrink:0"></div>
    <div class="search-wrap">
      <input class="search-inp" id="hist-search" placeholder="🔍  Search by location…" oninput="onHistSearch()" autocomplete="off"/>
      <div class="ac-drop" id="ac-drop" style="display:none"></div>
    </div>
    <div class="screen-body" id="hist-body" style="padding-top:8px"></div>
  </div>

  <!-- UPCOMING SCREEN -->
  <div class="screen" id="scr-upcoming">
    <div class="hdr">
      <div class="hdr-title" id="up-title">Upcoming</div>
      <button onclick="openDaySheet()" style="background:none;border:0.5px solid var(--blue);color:var(--blue);border-radius:20px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;margin-right:6px">📋 Day Sheet</button>
      <button class="btn-primary" onclick="openJobForm(null,null,selUpKey)">+ Add Job</button>
    </div>
    <div class="wk-nav">
      <button class="wk-btn" onclick="if(fwOff>0){fwOff--;selUpKey=wkStart(addDays(TODAY,fwOff*7));renderUpcoming()}">‹ Prev</button>
      <span class="wk-nav-lbl" id="wk-range"></span>
      <button class="wk-btn" onclick="fwOff++;selUpKey=wkStart(addDays(TODAY,fwOff*7));renderUpcoming()">Next ›</button>
    </div>
    <div class="wk-strip" id="wk-strip"></div>
    <div class="screen-body" id="up-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <button class="bnav-btn" id="nav-history" onclick="goScreen('history')">
      <div class="bnav-icon">📁</div><span>History</span>
    </button>
    <button class="bnav-btn active" id="nav-schedule" onclick="goScreen('schedule')">
      <div class="bnav-icon">📋</div><span>Schedule</span>
    </button>
    <button class="bnav-btn" id="nav-upcoming" onclick="goScreen('upcoming')">
      <div class="bnav-icon">📅</div><span>Upcoming</span>
    </button>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-root"></div>

<!-- DAY SHEET SCREEN -->
<div id="day-sheet-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:500;overflow-y:auto;padding:24px 20px 40px;max-width:430px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <button onclick="closeDaySheet()" style="background:none;border:none;font-size:28px;cursor:pointer;color:var(--text3);padding:0">✕</button>
    <div style="font-size:13px;color:var(--text3)">Screenshot & send to crew</div>
  </div>
  <div id="day-sheet-content"></div>
</div>

<script>
// ─── DATA STORE ──────────────────────────────────────────────────
const TODAY = toKey(new Date());
let nid = 200;
const uid = () => String(nid++);

let ECATS = ['Gas','Supplies','Equipment','Dump Fee','Other'];
const ECAT_COLOR = {Gas:'#185FA5',Supplies:'#0F6E56',Equipment:'#854F0B','Dump Fee':'#A32D2D',Other:'#534AB7'};
const SVC_COLOR = {Lawncare:'#3B6D11',Treework:'#854F0B',Mulching:'#5F5E5A',Landscaping:'#185FA5',Maintenance:'#BA7517'};
const SVCS = ['Lawncare','Treework','Mulching','Landscaping','Maintenance'];
const MAINT_ITEMS = ['Oil change','Mower blades','Air filter','Belt replacement','Battery replacement','Fuel filter','Grease fittings','Hydraulic fluid','Other'];
let MACHINES = [];
let PROFILES = [
  {name:"Bryan's House – Lawncare",loc:"Bryan's House",service:'Lawncare',price:65},
  {name:"Smith Residence – Mulching",loc:"Smith Residence",service:'Mulching',price:120},
  {name:"Jones – Landscaping",loc:"Jones Property",service:'Landscaping',price:200},
  {name:"Williams – Maintenance",loc:"Williams",service:'Maintenance',price:90},
  {name:"Taylor – Treework",loc:"Taylor",service:'Treework',price:350},
  {name:"Lake House – Lawncare",loc:"Lake House",service:'Lawncare',price:75},
];

// ─── PERSISTENCE ─────────────────────────────────────────────────
const SAVE_KEY = 'lawnapp_v1';
const JBIN_KEY_LS = 'lawnapp_jbin_key';
const JBIN_BIN_LS = 'lawnapp_jbin_bin';
let jbinApiKey  = localStorage.getItem(JBIN_KEY_LS) || '';
let jbinBinId   = localStorage.getItem(JBIN_BIN_LS) || '';
let _saveTimer  = null;
let _syncStatus = 'idle'; // idle | saving | error

function getSnapshot(){
  return { SC, DE, HW, PAID, MAINT, laborRate, ECATS, MACHINES, PROFILES, nid };
}

function applySnapshot(d){
  if(!d)return;
  if(d.SC)    Object.assign(SC, d.SC);
  if(d.DE)    Object.assign(DE, d.DE);
  if(d.HW)    Object.assign(HW, d.HW);
  if(d.PAID)  Object.assign(PAID, d.PAID);
  if(d.MAINT && d.MAINT.length){ MAINT.length=0; d.MAINT.forEach(m=>MAINT.push(m)); }
  if(d.laborRate) laborRate = d.laborRate;
  if(d.ECATS  && d.ECATS.length)   ECATS    = d.ECATS;
  if(d.MACHINES && d.MACHINES.length) MACHINES = d.MACHINES;
  if(d.PROFILES && d.PROFILES.length) PROFILES = d.PROFILES;
  if(d.nid && d.nid > nid) nid = d.nid;
}

// ── JSONBin cloud sync ───────────────────────────────────────────
async function jsonbinReq(url, method, body){
  const headers = {
    'Content-Type': 'application/json',
    'X-Master-Key': jbinApiKey
  };
  if(method==='POST'){
    headers['X-Bin-Name'] = 'LawnApp';
    headers['X-Bin-Private'] = 'true';
  }
  const opts = { method, headers };
  if(body) opts.body = typeof body==='string' ? body : JSON.stringify(body);
  const r = await fetch(url, opts);
  const txt = await r.text();
  if(!r.ok){
    throw new Error('HTTP '+r.status+': '+txt.slice(0,200));
  }
  try{ return JSON.parse(txt); }
  catch(e){ throw new Error('Bad JSON response: '+txt.slice(0,100)); }
}

async function cloudSave(){
  if(!jbinApiKey) return;
  setSyncIndicator('saving');
  const snapshot = getSnapshot();
  try{
    if(!jbinBinId){
      // First save — create a new bin
      const j = await jsonbinReq('https://api.jsonbin.io/v3/b', 'POST', snapshot);
      // With X-Bin-Meta:false the response IS the record, but id is in metadata
      // Try both response shapes
      const id = (j.metadata&&j.metadata.id) || j.id;
      if(!id) throw new Error('No bin ID in response: '+JSON.stringify(j).slice(0,100));
      jbinBinId = id;
      localStorage.setItem(JBIN_BIN_LS, jbinBinId);
    } else {
      await jsonbinReq('https://api.jsonbin.io/v3/b/'+jbinBinId, 'PUT', snapshot);
    }
    setSyncIndicator('ok');
  }catch(e){
    console.warn('Cloud save failed:', e.message);
    setSyncIndicator('error');
    alert('Sync failed: '+e.message);
  }
}

async function cloudLoad(){
  if(!jbinApiKey || !jbinBinId) return false;
  try{
    const j = await jsonbinReq('https://api.jsonbin.io/v3/b/'+jbinBinId+'/latest', 'GET');
    // With X-Bin-Meta:false the response is the raw record
    const record = j.record || j;
    if(record && record.SC){
      applySnapshot(record);
      saveLocal();
      return true;
    }
    throw new Error('Unexpected response shape');
  }catch(e){
    console.warn('Cloud load failed:', e.message);
    alert('Load failed: '+e.message);
    return false;
  }
}

// ── Sync indicator in UI ─────────────────────────────────────────
function setSyncIndicator(state){
  _syncStatus = state;
  const el = document.getElementById('sync-dot');
  if(!el) return;
  if(state==='saving') { el.textContent='⏳'; el.title='Syncing…'; el.style.opacity='1'; }
  else if(state==='ok') { el.textContent='☁️'; el.title='Synced to cloud'; el.style.opacity='1'; }
  else if(state==='error') { el.textContent='⚠️'; el.title='Sync failed — data saved locally'; el.style.opacity='1'; }
  else { el.textContent='☁️'; el.title=jbinApiKey?'Synced':'Tap to set up cloud sync'; }
}

// ── Main save — debounced, local + cloud ─────────────────────────
function save(){
  saveLocal();
  // Debounce cloud saves — wait 1.5s after last change
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(cloudSave, 1500);
}

// ── Startup load — try cloud first, fall back to local ───────────
async function loadAll(){
  loadLocal(); // Show local data immediately (fast)
  if(jbinApiKey && jbinBinId){
    setSyncIndicator('saving');
    const gotCloud = await cloudLoad();
    if(gotCloud){
      setSyncIndicator('ok');
      // Re-render everything with fresh cloud data
      renderSchedule();
      renderHistory();
      renderUpcoming();
    } else {
      setSyncIndicator('error');
    }
  }
}

// ── Manual pull — grab latest from cloud right now ───────────────

}

async function testSync(){
  const key = (document.getElementById('jbin-key-inp')?.value || jbinApiKey || '').trim();
  if(!key){ alert('Enter your Master Key first'); return; }
  
  const statusEl = document.getElementById('sync-status-txt');
  if(statusEl) statusEl.textContent = 'Testing...';
  
  try{
    // Test 1: Can we reach JSONBin at all?
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': key,
        'X-Bin-Name': 'LawnApp-Test',
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify({test: true, ts: Date.now()})
    });
    const txt = await r.text();
    if(!r.ok){
      alert('Connection test FAILED\nHTTP ' + r.status + '\n' + txt.slice(0,200));
      if(statusEl) statusEl.textContent = 'FAILED: HTTP ' + r.status;
      return;
    }
    const j = JSON.parse(txt);
    const testBinId = j.metadata?.id;
    if(!testBinId){
      alert('Connected but got unexpected response:\n' + txt.slice(0,200));
      return;
    }
    
    // Test 2: Can we read back?
    const r2 = await fetch('https://api.jsonbin.io/v3/b/'+testBinId+'/latest', {
      headers: {'X-Master-Key': key}
    });
    if(!r2.ok){
      alert('Write worked but read failed\nHTTP ' + r2.status);
      return;
    }
    
    // Clean up test bin
    fetch('https://api.jsonbin.io/v3/b/'+testBinId, {
      method: 'DELETE',
      headers: {'X-Master-Key': key}
    }).catch(()=>{});
    
    alert('✓ Connection successful!\nJSONBin is working correctly.\nNow tap Save & Sync to start syncing your data.');
    if(statusEl) statusEl.textContent = '✓ Connection OK';
    
  }catch(e){
    alert('Connection test ERROR:\n' + e.message + '\n\nThis usually means a network issue or the key is wrong.');
    if(statusEl) statusEl.textContent = 'ERROR: ' + e.message.slice(0,40);
  }
}

function saveSyncKey(){
  const key = (document.getElementById('jbin-key-inp').value||'').trim();
  if(!key){ alert('Please enter your JSONBin Master Key'); return; }
  const binInp = (document.getElementById('jbin-bin-inp').value||'').trim();
  jbinApiKey = key;
  localStorage.setItem(JBIN_KEY_LS, key);
  if(binInp){
    // User pasted a bin ID from another device — use it
    jbinBinId = binInp;
    localStorage.setItem(JBIN_BIN_LS, jbinBinId);
  } else if(!jbinBinId){
    jbinBinId = '';
    localStorage.removeItem(JBIN_BIN_LS);
  }
  closeSheet();
  showToast('Syncing…');
  if(jbinBinId){
    // Pull from existing bin first, then we have the data
    cloudLoad().then(ok=>{
      if(ok){ renderSchedule();renderHistory();renderUpcoming();showToast('✓ Data loaded from cloud!'); }
      else { cloudSave().then(()=>showToast('✓ Cloud sync enabled!')); }
    });
  } else {
    cloudSave().then(()=>showToast('✓ Cloud sync enabled! Copy your Bin ID to other devices.'));
  }
}

function clearSyncKey(){
  if(!confirm('Disconnect cloud sync? Your local data stays safe.'))return;
  jbinApiKey=''; jbinBinId='';
  localStorage.removeItem(JBIN_KEY_LS);
  localStorage.removeItem(JBIN_BIN_LS);
  setSyncIndicator('idle');
  closeSheet();
  showToast('Cloud sync disconnected');
}

const SC = {}; // {dateKey: Job[]}
const DE = {}; // {dateKey: Expense[]}
const HW = {}; // {dateKey: number}
const PAID = {}; // {jobId: bool}
const MAINT = []; // MaintItem[]

function gS(k){if(!SC[k])SC[k]=[];return SC[k];}
function gDE(k){if(!DE[k])DE[k]=[];return DE[k];}

function tRev(k){return gS(k).filter(j=>!j.skipped).reduce((s,j)=>s+(+j.price||0),0);}
function tJE(k){return gS(k).reduce((s,j)=>s+((j.jE||[]).reduce((a,e)=>a+(+e.amount||0),0)),0);}
function tDE(k){return gDE(k).reduce((s,e)=>s+(+e.amount||0),0);}
function tExp(k){return tJE(k)+tDE(k);}
function gHrs(k){return HW[k]||0;}
function isPaid(id){return!!PAID[id];}

let laborRate = 25;
loadLocal(); // Load local data synchronously on startup

// ─── DATE HELPERS ─────────────────────────────────────────────────
function toKey(d){const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function wkStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return toKey(r);}
function fmtDate(k){const d=new Date(k+'T12:00:00');return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();}
function monthLabel(off){const d=new Date();d.setMonth(d.getMonth()+off);return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]+' '+d.getFullYear();}
function monthKeys(off){
  const d=new Date();d.setMonth(d.getMonth()+off);
  const y=d.getFullYear(),m=d.getMonth();
  const s=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const e=y+'-'+String(m+1).padStart(2,'0')+'-'+String(new Date(y,m+1,0).getDate()).padStart(2,'0');
  return Object.keys(SC).filter(k=>k>=s&&k<=e&&SC[k].length>0).sort((a,b)=>b.localeCompare(a));
}
function monthStats(off){
  let rev=0,exp=0,hrs=0,col=0,out=0;
  monthKeys(off).forEach(k=>{
    rev+=tRev(k);exp+=tExp(k);hrs+=gHrs(k);
    gS(k).filter(j=>!j.skipped).forEach(j=>{isPaid(j.id)?col+=(+j.price||0):out+=(+j.price||0);});
  });
  return{rev,exp,hrs,labor:hrs*laborRate,profit:rev-exp-(hrs*laborRate),days:monthKeys(off).length,col,out};
}
function allLocs(){const s=new Set();Object.values(SC).forEach(js=>js.forEach(j=>s.add(j.loc)));return Array.from(s).sort();}
function profileNameFor(j){
  // Use stored profile name if available
  if(j.profileName && j.profileName !== j.loc){
    return{name:j.profileName, addr:j.loc};
  }
  // Fall back to matching by loc+service
  const p=PROFILES.find(p=>p.loc===j.loc&&p.service===j.service);
  if(p&&p.name&&p.name!==j.loc)return{name:p.name,addr:j.loc};
  return{name:j.loc,addr:null};
}

function doMoveJob(jid,fromKey,toKey2){
  const jobs=gS(fromKey);const idx=jobs.findIndex(j=>j.id===jid);

  closeSheet();
  viewKey=TODAY;
  renderSchedule();
  renderUpcoming();
  showToast('Job moved to '+fmtDate(toKey2));

function doSkip(jid,k){
  const j=gS(k).find(x=>x.id===jid);if(j){j.skipped=true;save();}
  closeSheet();
  viewKey=k;
  renderSchedule();
}

function saveJobForm(editId,editKey,defKey){
  const loc=document.getElementById('jf-loc').value.trim();
  if(!loc){alert('Location required');return;}
  const dateVal=document.getElementById('jf-date').value||defKey;
  const svc=document.querySelector('#svc-chips .chip.on')?.textContent||'Lawncare';
  const price=parseFloat(document.getElementById('jf-price').value)||0;
  const note=document.getElementById('jf-note').value.trim();
  const jE=(window._jeItems||[]).filter(e=>+e.amount>0);
  if(editId){
    const j=gS(editKey).find(x=>x.id===editId);
    if(j){j.loc=loc;j.service=svc;j.price=price;j.note=note;j.jE=jE;}
  } else {
    gS(dateVal).push({id:uid(),loc,service:svc,note,price,done:false,skipped:false,jE,profileName:window._selectedProfileName||''});window._selectedProfileName='';
  }
  // Only update viewKey if we're on the schedule screen
  if(curScreen === 'schedule') viewKey = dateVal;
  save();
  closeSheet();
  if(curScreen === 'schedule') renderSchedule();
  else if(curScreen === 'upcoming') renderUpcoming();
  else { renderSchedule(); renderUpcoming(); }
}

function deleteJob(id,k){
  if(!confirm('Delete this job?'))return;
  SC[k]=gS(k).filter(j=>j.id!==id);
  if(curScreen==='schedule') viewKey=k;
  save();
  closeSheet();
  if(curScreen==='upcoming') renderUpcoming();
  else renderSchedule();
}

        ${m.notes?`<div style="font-size:12px;color:var(--text3)">${m.notes}</div>`:''}
      </div>
    </div>`).join('');
  showSheet(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="sheet-title" style="margin-bottom:0">Maintenance log</div>
      <button class="btn-primary" onclick="closeSheet();setTimeout(()=>openMaintForm(),50)">+ Log item</button>
    </div>
    <div style="max-height:50vh;overflow-y:auto">${rows||'<div class="empty">No maintenance logged yet.</div>'}</div>
    <button class="btn-outline" style="margin-top:14px" onclick="closeSheet()">Close</button>
  `);
}

function openMaintForm(editId){
  const ex=editId?MAINT.find(m=>m.id===editId):null;
  function machRow(m,mi){
    const isSel=ex&&ex.machine===m;
    return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
      <button class="chip${isSel?' on':''}" id="mach-${mi}" onclick="selectMachine(${mi})" style="flex:1;text-align:left">${m}</button>
      <button onclick="removeMachineAt(${mi})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">×</button>
    </div>`;
  }
  const machRows=MACHINES.map((m,mi)=>machRow(m,mi)).join('');
  const itmChips=MAINT_ITEMS.map((it,i)=>`<button class="chip${(ex?ex.item===it:i===0)?' on':''}" onclick="pickMaintItem(this)">${it}</button>`).join('');
  showSheet(`
    <div class="sheet-title">${ex?'Edit maintenance':'Log maintenance'}</div>
    <div class="fl">Date</div>
    <input type="date" id="mf-date" value="${ex?ex.date:viewKey}"/>
    <div class="fl">Machine</div>
    <div id="mach-list">${machRows}</div>
    <button class="chip amber-on" id="show-new-mach-btn" onclick="toggleNewMachInput()">+ Add new machine</button>
    <div id="new-mach-wrap" style="display:none;margin-top:8px">
      <input type="text" id="new-mach" placeholder="Machine name e.g. Zero Turn"/>
      <button class="btn-save" style="width:100%;margin-top:6px" onclick="saveNewMachine()">Add Machine</button>
    </div>
    <div class="fl">Hour meter reading</div>
    <input type="number" id="mf-hrs" placeholder="e.g. 142" step="0.1" min="0" value="${ex&&ex.hours?ex.hours:''}"/>
    <div class="fl">Maintenance item</div>
    <div class="chips" id="mitm-chips">${itmChips}</div>
    <div class="fl">Custom item (overrides selection)</div>
    <input type="text" id="mf-custom" placeholder="e.g. Drive belt replacement" value="${ex&&!MAINT_ITEMS.includes(ex.item)?ex.item:''}"/>
    <div class="fl">Notes (optional)</div>
    <textarea id="mf-notes" placeholder="e.g. Used 10W-30">${ex?ex.notes:''}</textarea>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn-save" onclick="saveMaintForm('${editId||''}')"> ${ex?'Save Changes':'Log Item'}</button>
    </div>
    ${ex?`<button class="btn-danger" onclick="deleteMaint('${editId}')">Delete</button>`:''}
  `);
  window._selectedMachine = ex?ex.machine:'';
}

function selectMachine(idx){
  document.querySelectorAll('#mach-list .chip').forEach(c=>c.classList.remove('on'));
  const btn=document.getElementById('mach-'+idx);
  if(btn){btn.classList.add('on');window._selectedMachine=MACHINES[idx];}
}

function pickMaintItem(btn){
  document.querySelectorAll('#mitm-chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
}

function toggleNewMachInput(){
  const w=document.getElementById('new-mach-wrap');
  w.style.display=w.style.display==='none'?'block':'none';
}

function saveNewMachine(){
  const nm=(document.getElementById('new-mach').value||'').trim();
  if(!nm)return;
  if(!MACHINES.includes(nm)){MACHINES.push(nm);save();}
  window._selectedMachine=nm;
  // Refresh the mach list in the DOM
  const list=document.getElementById('mach-list');
  if(list){
    list.innerHTML=MACHINES.map((m,mi)=>`<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
      <button class="chip${m===window._selectedMachine?' on':''}" id="mach-${mi}" onclick="selectMachine(${mi})" style="flex:1;text-align:left">${m}</button>
      <button onclick="removeMachineAt(${mi})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">×</button>
    </div>`).join('');
  }
  document.getElementById('new-mach-wrap').style.display='none';
  document.getElementById('new-mach').value='';
}

function removeMachineAt(idx){
  if(!confirm('Remove "'+MACHINES[idx]+'"?'))return;
  if(window._selectedMachine===MACHINES[idx])window._selectedMachine='';
  MACHINES.splice(idx,1);
  save();
  const list=document.getElementById('mach-list');
  if(list){
    list.innerHTML=MACHINES.map((m,mi)=>`<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
      <button class="chip${m===window._selectedMachine?' on':''}" id="mach-${mi}" onclick="selectMachine(${mi})" style="flex:1;text-align:left">${m}</button>
      <button onclick="removeMachineAt(${mi})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1">×</button>
    </div>`).join('');
  }
}

function saveMaintForm(editId){
  const date=document.getElementById('mf-date').value||viewKey;
  const custom=(document.getElementById('mf-custom').value||'').trim();
  const item=custom||document.querySelector('#mitm-chips .chip.on')?.textContent||MAINT_ITEMS[0];
  const notes=(document.getElementById('mf-notes').value||'').trim();
  const hours=parseFloat(document.getElementById('mf-hrs').value)||null;
  const machine=window._selectedMachine||'';
  if(editId){
    const m=MAINT.find(x=>x.id===editId);
    if(m){m.date=date;m.item=item;m.machine=machine;m.hours=hours;m.notes=notes;}
  } else {
    MAINT.push({id:uid(),date,item,machine,hours,notes});
  }
  save();closeSheet();renderSchedule();
}

function deleteMaint(id){
  if(!confirm('Delete maintenance item?'))return;
  const idx=MAINT.findIndex(m=>m.id===id);if(idx>-1)MAINT.splice(idx,1);
  save();closeSheet();renderSchedule();renderUpcoming();
}

// ─── HISTORY ──────────────────────────────────────────────────────
let histMO=0, profTog=false;

function renderHistory(){
  document.getElementById('hist-month-lbl').textContent=monthLabel(histMO);
  const s=monthStats(histMO);
  const totalJobs=monthKeys(histMO).reduce((t,k)=>t+SC[k].length,0);

  const profTile=profTog?`
    <div class="tile toggled click" onclick="profTog=!profTog;renderHistory()">
      <div class="tile-l" style="margin-bottom:6px">tap to toggle ↩</div>
      <div class="tog-grid">
        <div class="tog-item"><div class="tog-l">Collected</div><div class="tog-v" style="color:var(--green)">$${s.col.toFixed(0)}</div></div>
        <div class="tog-item"><div class="tog-l">Outstanding</div><div class="tog-v" style="color:var(--amber)">$${s.out.toFixed(0)}</div></div>
      </div>
    </div>`:`
    <div class="tile click" onclick="profTog=!profTog;renderHistory()">
      <div class="tile-l">Profit</div>
      <div class="tile-v ${s.profit>=0?'g':'r'}">$${s.profit.toFixed(0)}</div>
      <div class="tile-s">tap to see collected</div>
    </div>`;

  document.getElementById('tiles-wrap').innerHTML=`
    <div class="tiles">
      <div class="tile click" onclick="openHrsTile()"><div class="tile-l">Hours worked ›</div><div class="tile-v b">${s.hrs.toFixed(1)}<span style="font-size:13px;font-weight:400;color:var(--text3)"> hrs</span></div><div class="tile-s">@ $${laborRate}/hr · ${s.days} days</div></div>
      <div class="tile click" onclick="openRevTile()"><div class="tile-l">Revenue ›</div><div class="tile-v g">$${s.rev.toFixed(0)}</div><div class="tile-s">${totalJobs} jobs</div></div>
      <div class="tile click" onclick="openExpTile()"><div class="tile-l">Expenses ›</div><div class="tile-v r">$${s.exp.toFixed(0)}</div><div class="tile-s">tap for breakdown</div></div>
      ${profTile}
    </div>
    <div class="pnote">Profit = Revenue − Expenses − (${s.hrs.toFixed(1)} hrs × $${laborRate}/hr)</div>`;

  renderHistList(document.getElementById('hist-search').value||'');
}

function renderHistList(filter){
  const f=filter.toLowerCase();
  const keys=monthKeys(histMO);
  const fk=f?keys.filter(k=>gS(k).some(j=>j.loc.toLowerCase().includes(f))):keys;
  if(!fk.length){document.getElementById('hist-body').innerHTML='<div class="empty">No days recorded this month.</div>';return;}
  document.getElementById('hist-body').innerHTML=fk.map(k=>{
    const rev=tRev(k),exp=tExp(k),hrs=gHrs(k),net=rev-exp;
    const paid=gS(k).filter(j=>isPaid(j.id)&&!j.skipped).reduce((s,j)=>s+(+j.price||0),0);
    const out=rev-paid;
    return`<div class="hist-row" onclick="openHistDay('${k}')">
      <div>
        <div class="hist-date">${fmtDate(k)}</div>
        <div class="hist-meta">${gS(k).length} job${gS(k).length>1?'s':''}${hrs?' · '+hrs+' hrs':' · no hours'}</div>
        ${out>0?`<div class="hist-outstanding">$${out.toFixed(0)} outstanding</div>`:''}
      </div>
      <div style="text-align:right">
        <div class="hist-rev">$${rev.toFixed(2)}</div>
        ${exp?`<div style="font-size:11px;color:var(--red)">-$${exp.toFixed(2)} exp</div>`:''}
        <div style="font-size:11px;color:var(--text3)">net $${net.toFixed(0)}</div>
      </div>
    </div>`;
  }).join('');
}

function onHistSearch(){
  const val=document.getElementById('hist-search').value.trim().toLowerCase();
  const ac=document.getElementById('ac-drop');
  if(val){
    const matches=allLocs().filter(l=>l.toLowerCase().includes(val));
    if(matches.length){
      ac.innerHTML=matches.map(l=>{const idx=l.toLowerCase().indexOf(val);return`<div class="ac-item" onclick="document.getElementById('hist-search').value='${l}';document.getElementById('ac-drop').style.display='none';renderHistList('${l}')">${l.slice(0,idx)}<b>${l.slice(idx,idx+val.length)}</b>${l.slice(idx+val.length)}</div>`;}).join('');
      ac.style.display='block';
    } else ac.style.display='none';
  } else ac.style.display='none';
  renderHistList(val);
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('ac-drop').style.display='none';});

function openHistDay(k){
  const rev=tRev(k),exp=tExp(k),hrs=gHrs(k);
  const paid=gS(k).filter(j=>isPaid(j.id)&&!j.skipped).reduce((s,j)=>s+(+j.price||0),0);
  const out=rev-paid;
  const jobRows=gS(k).map(j=>{
    const et=(j.jE||[]).reduce((s,e)=>s+(+e.amount||0),0);
    const p=isPaid(j.id);
    return`<div class="jcard ${j.service.toLowerCase().replace(' ','')}${j.skipped?' skipped':''}" style="border-left-color:${j.skipped?'var(--border)':SVC_COLOR[j.service]||'var(--border)'}">
      <div class="jrow">
        <div class="ck on" style="flex-shrink:0">${j.skipped?'—':'✓'}</div>
        <div class="jinfo">
          <div class="jloc${j.skipped?' skip':''}">${(()=>{const pn=profileNameFor(j);return pn.addr?'<div class="jloc-name">'+pn.name+(j.skipped?' <span style="font-size:11px">(skipped)</span>':'')+' </div><div class="jloc-addr">'+pn.addr+'</div>':pn.name+(j.skipped?' <span style="font-size:11px">(skipped)</span>':'');})()}</div>
          <div class="badges">
            <span class="badge${j.skipped?' skip':' done'}">${j.service}</span>
            ${!j.skipped&&j.price?`<span class="ptag">$${(+j.price).toFixed(2)}</span>`:''}
            ${et?`<span class="etag">-$${et.toFixed(2)}</span>`:''}
          </div>
          ${j.note?`<div class="jnote">${j.note}</div>`:''}
        </div>
        <div class="card-btns">
          ${!j.skipped?`<button class="icon-btn" onclick="openAddJobExpHist('${j.id}','${k}')" title="Add expense" style="color:var(--red);font-weight:700">$</button>`:''}
          ${!j.skipped?`<button class="icon-btn" onclick="toggleHistPaid('${j.id}','${k}',this)" title="${p?'Mark unpaid':'Mark paid'}" style="color:${p?'var(--green)':'var(--amber)'};font-size:18px">🫴</button>`:''}
          <button class="icon-btn" onclick="deleteHistJob('${j.id}','${k}')" title="Delete job" style="font-size:14px">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');

  showSheet(`
    <div class="sheet-title">${fmtDate(k)}</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div class="sum-pill" id="hd-hrs-pill" onclick="editHistHours('${k}')" style="cursor:pointer;flex:1">
        <div class="sum-label">Hours ✏️</div>
        <div class="sum-val b" id="hd-hrs-val">${hrs?hrs+' hrs':'Tap to add'}</div>
      </div>
      <div class="sum-pill" onclick="openExpForm(null,'${k}')" style="cursor:pointer;flex:1">
        <div class="sum-label">Expenses ✏️</div>
        <div class="sum-val r">${exp?'$'+exp.toFixed(2):'Tap to add'}</div>
      </div>
      <div class="sum-pill" style="flex:1">
        <div class="sum-label">Revenue</div>
        <div class="sum-val g">$${rev.toFixed(2)}</div>
      </div>
    </div>
    <div class="banner ${out>0?'out':'col'}" id="hd-banner">
      ${out>0?`<span style="color:var(--amber);font-weight:600">Outstanding</span><span style="color:var(--amber);font-weight:600">$${out.toFixed(2)}</span>`:`<span style="color:var(--green);font-weight:600">All collected ✓</span><span style="color:var(--green);font-weight:600">$${rev.toFixed(2)}</span>`}
    </div>
    <div style="max-height:40vh;overflow-y:auto">${jobRows}</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-cancel" onclick="closeSheet()">Close</button>
      <button class="btn-save" style="background:none;border:0.5px solid var(--blue);color:var(--blue);flex:1" onclick="openCopySheet('${k}','${fmtDate(k)}')">Copy to another day</button>
    </div>
  `);
}

function toggleHistPaid(jid, k, btn){
  PAID[jid] = !PAID[jid];
  save();
  const p = isPaid(jid);
  btn.style.color = p ? 'var(--green)' : 'var(--amber)';
  btn.title = p ? 'Mark unpaid' : 'Mark paid';
  const rev = tRev(k);
  const paidAmt = gS(k).filter(j=>isPaid(j.id)&&!j.skipped).reduce((s,j)=>s+(+j.price||0),0);
  const out = rev - paidAmt;
  const banner = document.getElementById('hd-banner');
  if(banner){
    banner.className = 'banner '+(out>0?'out':'col');
    banner.innerHTML = out>0
      ? '<span style="color:var(--amber);font-weight:600">Outstanding</span><span style="color:var(--amber);font-weight:600">$'+out.toFixed(2)+'</span>'
      : '<span style="color:var(--green);font-weight:600">All collected ✓</span><span style="color:var(--green);font-weight:600">$'+rev.toFixed(2)+'</span>';
  }
}

function editHistHours(k){
  const cur=gHrs(k);
  const inp=document.createElement('input');
  inp.type='number';inp.placeholder='e.g. 5.5';inp.step='0.5';inp.min='0';inp.value=cur||'';
  inp.style.cssText='width:100%;padding:8px;border:1px solid var(--blue);border-radius:8px;font-size:15px;margin-top:6px';
  const pill=document.getElementById('hd-hrs-pill');
  pill.appendChild(inp);inp.focus();
  inp.onblur=()=>{
    const h=parseFloat(inp.value)||0;
    if(h>0)HW[k]=h;else delete HW[k];save();
    document.getElementById('hd-hrs-val').textContent=h?h+' hrs':'Tap to add';
    inp.remove();renderHistory();
  };
}

function openAddJobExpHist(jid,k){
  let cat=ECATS[0];
  const catChips=ECATS.map(c=>`<button class="chip${c===cat?' on':''}" onclick="document.querySelectorAll('#hjexp-chips .chip').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${c}</button>`).join('');
  showSheet(`
    <div class="sheet-title">Add job expense</div>
    <div class="fl">Category</div>
    <div class="chips" id="hjexp-chips">${catChips}</div>
    <div class="fl">Description (optional)</div>
    <input type="text" id="hjexp-desc" placeholder="e.g. fuel"/>
    <div class="fl">Amount</div>
    <div class="dollar-row"><span>$</span><input type="number" id="hjexp-amt" placeholder="0.00" step="0.01" min="0"/></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeSheet();setTimeout(()=>openHistDay('${k}'),50)">Cancel</button>
      <button class="btn-save" onclick="saveHistJobExp('${jid}','${k}')">Add</button>
    </div>
  `);
}

function saveHistJobExp(jid,k){
  const amt=parseFloat(document.getElementById('hjexp-amt').value);
  if(!amt){alert('Enter an amount');return;}
  const j=gS(k).find(x=>x.id===jid);
  if(j){if(!j.jE)j.jE=[];j.jE.push({id:uid(),cat:document.querySelector('#hjexp-chips .chip.on')?.textContent||ECATS[0],desc:document.getElementById('hjexp-desc').value.trim(),amount:amt});save();}
  closeSheet();renderHistory();setTimeout(()=>openHistDay(k),50);
}

// ─── HISTORY TILES ────────────────────────────────────────────────
function openHrsTile(){
  const s=monthStats(histMO);
  const dayRows=monthKeys(histMO).filter(k=>HW[k]).map(k=>`<div class="bdr-row"><span>${fmtDate(k)}</span><span style="font-weight:600;color:var(--blue)">${HW[k]} hrs</span></div>`).join('');
  showSheet(`
    <div class="sheet-title">Hours & Labor Rate</div>
    <div class="info-box">
      <div class="info-row"><span style="color:var(--text2)">Total hours</span><b style="color:var(--blue)">${s.hrs.toFixed(1)} hrs</b></div>
      <div class="info-row"><span style="color:var(--text2)">Labor cost</span><b style="color:var(--red)">$${s.labor.toFixed(2)}</b></div>
      <div class="info-row"><span style="color:var(--text2)">Hourly rate</span><b>$${laborRate}/hr</b></div>
    </div>
    <div class="fl">Change hourly rate</div>
    <div class="dollar-row"><span>$</span><input type="number" id="rate-inp" value="${laborRate}" step="1" min="1"/></div>
    <button class="btn-save" style="width:100%;margin-top:10px" onclick="updateRate()">Update Rate</button>
    <div style="border-top:0.5px solid var(--border);margin-top:14px;padding-top:10px">
      <div class="slbl">Hours by day</div>
      ${dayRows||'<div style="text-align:center;padding:12px;color:var(--text3)">No hours logged.</div>'}
    </div>
    <button class="btn-outline" style="margin-top:14px" onclick="closeSheet()">Close</button>
  `);
}

function updateRate(){
  const nr=parseFloat(document.getElementById('rate-inp').value);
  if(!nr)return;
  if(confirm(`Change rate from $${laborRate}/hr to $${nr}/hr? This affects all profit calculations.`)){
    laborRate=nr;save();closeSheet();renderHistory();showToast('Rate updated to $'+laborRate+'/hr');
  }
}

function openRevTile(){
  const s=monthStats(histMO);
  const c={},t={};
  monthKeys(histMO).forEach(k=>gS(k).filter(j=>!j.skipped).forEach(j=>{c[j.loc]=(c[j.loc]||0)+1;t[j.loc]=(t[j.loc]||0)+(+j.price||0);}));
  const rows=Object.keys(c).sort((a,b)=>t[b]-t[a]).map(loc=>`<div class="bdr-row">
    <div><div style="font-size:14px">${loc}</div><div style="font-size:11px;color:var(--text3)">${c[loc]} visit${c[loc]>1?'s':''}</div></div>
    <div style="text-align:right"><div style="font-weight:600;color:var(--green)">$${t[loc].toFixed(2)}</div><div style="font-size:11px;color:var(--text3)">${s.rev?Math.round(t[loc]/s.rev*100):0}%</div></div>
  </div>`).join('');
  showSheet(`
    <div class="sheet-title">Revenue Sources</div>
    <div class="info-box" style="display:flex;justify-content:space-between;align-items:center"><span style="color:var(--text2)">Total</span><span style="font-size:20px;font-weight:700;color:var(--green)">$${s.rev.toFixed(2)}</span></div>
    ${rows||'<div style="text-align:center;padding:20px;color:var(--text3)">No revenue this month.</div>'}
    <button class="btn-outline" style="margin-top:14px" onclick="closeSheet()">Close</button>
  `);
}

function openExpTile(){
  const s=monthStats(histMO);
  const cats={};
  monthKeys(histMO).forEach(k=>{
    const d=k;const lbl=fmtDate(k);
    gDE(k).forEach(e=>{if(!cats[e.cat])cats[e.cat]=[];cats[e.cat].push({desc:e.desc||e.cat,amount:+e.amount,date:lbl});});
    gS(k).forEach(j=>(j.jE||[]).forEach(e=>{if(!cats[e.cat])cats[e.cat]=[];cats[e.cat].push({desc:(e.desc||e.cat)+' ('+j.loc+')',amount:+e.amount,date:lbl});}));
  });
  let html='';
  Object.keys(cats).forEach(cat=>{
    const items=cats[cat],tot=items.reduce((s,i)=>s+i.amount,0);
    html+=`<div class="cat-hdr"><span style="color:${ECAT_COLOR[cat]||'#888'}">${cat}</span><span style="color:var(--red)">$${tot.toFixed(2)}</span></div>`;
    items.forEach(i=>{html+=`<div class="bdr-row"><div><div style="font-size:14px">${i.desc}</div><div style="font-size:11px;color:var(--text3)">${i.date}</div></div><div style="font-weight:600;color:var(--red)">$${i.amount.toFixed(2)}</div></div>`;});
  });
  showSheet(`
    <div class="sheet-title">Expense Breakdown</div>
    <div class="info-box" style="display:flex;justify-content:space-between;align-items:center"><span style="color:var(--text2)">Total</span><span style="font-size:20px;font-weight:700;color:var(--red)">$${s.exp.toFixed(2)}</span></div>
    ${html||'<div style="text-align:center;padding:20px;color:var(--text3)">No expenses this month.</div>'}
    <button class="btn-outline" style="margin-top:14px" onclick="closeSheet()">Close</button>
  `);
}

// ─── COPY SCHEDULE ────────────────────────────────────────────────

function openCopySheet(srcKey,srcLabel){

}

function renderCopySheet(srcKey,srcLabel){

  const wkLbl=lbl[wsDate.getMonth()]+' '+wsDate.getDate()+' – '+lbl[wkEndDate.getMonth()]+' '+wkEndDate.getDate();
  const strip=Array.from({length:7},(_,i)=>{
    const d=addDays(wsDate,i),k=toKey(d);
    const has=SC[k]&&SC[k].length>0,isSel=k===selCopyKey;
    return`<div class="dp${has?' hj':''}${isSel?' sel':''}" onclick="selCopyKey='${k}';renderCopySheet('${srcKey}','${srcLabel}')">

    <div class="sheet-title">Copy from<br><span style="font-size:14px;font-weight:400;color:var(--text2)">${srcLabel}</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button class="wk-btn" onclick="if(copyWkOff>1){copyWkOff--;renderCopySheet('${srcKey}','${srcLabel}')}">‹</button>
      <span style="font-size:13px;color:var(--text2)">${wkLbl}</span>
      <button class="wk-btn" onclick="copyWkOff++;renderCopySheet('${srcKey}','${srcLabel}')">›</button>
    </div>
    <div class="wk-strip" style="padding:0;margin-bottom:12px;background:none;border:none">${strip}</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:6px">${fmtDate(selCopyKey)}</div>
    ${ec?`<div style="font-size:13px;color:var(--text2);margin-bottom:6px">${ec} existing job${ec>1?'s':''} — new ones will be added.</div>`:'<div style="font-size:13px;color:var(--text3);margin-bottom:6px">No jobs on this day yet.</div>'}

      <button class="btn-save" onclick="doCopy('${srcKey}')">Copy Here</button>

  `);
}

function deleteHistJob(jid,k){

  SC[k]=(SC[k]||[]).filter(j=>j.id!==jid);

function doCopy(srcKey){
  (SC[srcKey]||[]).forEach(j=>gS(selCopyKey).push({...j,id:uid(),done:false,skipped:false,jE:[]}));
  save();viewKey=selCopyKey;closeSheet();goScreen('schedule');

// ─── DRAG TO REORDER ─────────────────────────────────────────────
let _dragSrcId=null, _dragSrcKey=null;

function initDrag(container){
  const cards=container.querySelectorAll('.jcard[draggable]');
  cards.forEach(card=>{
    card.addEventListener('dragstart',e=>{
      _dragSrcId=card.dataset.id;
      _dragSrcKey=card.dataset.key;
      setTimeout(()=>card.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      container.querySelectorAll('.jcard').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      container.querySelectorAll('.jcard').forEach(c=>c.classList.remove('drag-over'));
      if(card.dataset.id!==_dragSrcId)card.classList.add('drag-over');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();
      card.classList.remove('drag-over');
      const toId=card.dataset.id;
      const toKey=card.dataset.key;
      if(!_dragSrcId||_dragSrcId===toId||_dragSrcKey!==toKey)return;
      const jobs=gS(toKey);
      const fromIdx=jobs.findIndex(j=>j.id===_dragSrcId);
      const toIdx=jobs.findIndex(j=>j.id===toId);
      if(fromIdx<0||toIdx<0)return;
      const [moved]=jobs.splice(fromIdx,1);
      jobs.splice(toIdx,0,moved);
      save();
      if(toKey===viewKey)renderSchedule();
      else renderUpcoming();
    });
  });

  // Touch drag support for mobile
  let touchItem=null, touchClone=null, touchStartY=0, touchSrcIdx=-1;
  cards.forEach((card,cardIdx)=>{
    card.addEventListener('touchstart',e=>{
      const handle=e.target.closest('.drag-handle');
      if(!handle)return;
      e.preventDefault();
      touchItem=card;
      touchSrcIdx=cardIdx;
      const t=e.touches[0];
      touchStartY=t.clientY;
      touchClone=card.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;width:${card.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:12px;`;
      document.body.appendChild(touchClone);
      card.style.opacity='0.3';
    },{passive:false});

    card.addEventListener('touchmove',e=>{
      if(!touchClone)return;
      e.preventDefault();
      const t=e.touches[0];
      const dy=t.clientY-touchStartY;
      touchClone.style.top=(parseFloat(touchClone.style.top)+dy)+'px';
      touchStartY=t.clientY;
      // Highlight drop target
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const overCard=el?.closest('.jcard[draggable]');
      container.querySelectorAll('.jcard').forEach(c=>c.classList.remove('drag-over'));
      if(overCard&&overCard!==touchItem)overCard.classList.add('drag-over');
    },{passive:false});

    card.addEventListener('touchend',e=>{
      if(!touchClone)return;
      touchClone.remove();touchClone=null;
      if(touchItem)touchItem.style.opacity='';
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const overCard=el?.closest('.jcard[draggable]');
      container.querySelectorAll('.jcard').forEach(c=>c.classList.remove('drag-over'));
      if(overCard&&overCard!==touchItem&&overCard.dataset.key===touchItem?.dataset.key){
        const toId=overCard.dataset.id;
        const key=overCard.dataset.key;
        const jobs=gS(key);
        const fromIdx=jobs.findIndex(j=>j.id===touchItem.dataset.id);
        const toIdx=jobs.findIndex(j=>j.id===toId);
        if(fromIdx>=0&&toIdx>=0){
          const [moved]=jobs.splice(fromIdx,1);
          jobs.splice(toIdx,0,moved);
          save();
          if(key===viewKey)renderSchedule();
          else renderUpcoming();
        }
      }
      touchItem=null;
    });
  });
}

// ─── SHEET / MODAL HELPERS ────────────────────────────────────────
function showSheet(html,afterRender){
  const root=document.getElementById('modal-root');
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeSheet();});
  root.appendChild(ov);
  if(afterRender)afterRender();
  // drag to close
  const sh=ov.querySelector('.sheet');
  const handle=ov.querySelector('.sheet-handle');
  let sy=0,on=false;
  handle.addEventListener('touchstart',e=>{on=true;sy=e.touches[0].clientY;sh.style.transition='none';},{passive:true});
  window.addEventListener('touchmove',e=>{if(!on)return;const y=e.touches[0].clientY-sy;if(y>0)sh.style.transform=`translateY(${y}px)`;},{passive:true});
  window.addEventListener('touchend',e=>{if(!on)return;on=false;const y=e.changedTouches[0].clientY-sy;sh.style.transition='transform .25s ease';if(y>80){sh.style.transform='translateY(100%)';setTimeout(closeSheet,240);}else sh.style.transform='';});
}

function closeSheet(){
  const root=document.getElementById('modal-root');
  const last=root.lastChild;if(last)last.remove();
}

function showToast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

  const url = (document.getElementById('sheets-url').value||'').trim();
  if(!url){ alert('Please paste your Google Apps Script URL'); return; }
  sheetsWebhookUrl = url;
  localStorage.setItem('lawnapp_sheets_url', url);
  const inclAll = document.getElementById('exp-all')?.checked;
  const inclExp = document.getElementById('exp-expenses')?.checked;
  doExport(url, inclAll, inclExp);
}


function doExport(url, inclAll, inclExp){
  // Build rows from all schedule data
  const rows = [];
  rows.push(['Date','Profile/Location','Address','Service','Price','Status','Paid','Hours','Job Expenses','Day Expenses','Notes']);

  const allKeys = Object.keys(SC).sort();
  allKeys.forEach(k=>{
    const jobs = SC[k] || [];
    const hrs = HW[k] || '';
    const dayExp = (DE[k]||[]).reduce((s,e)=>s+(+e.amount||0),0);
    jobs.forEach(j=>{
      if(!inclAll && !j.done) return;
      const pn = profileNameFor(j);
      const jExp = (j.jE||[]).reduce((s,e)=>s+(+e.amount||0),0);
      rows.push([
        k,
        pn.name,
        pn.addr || j.loc,
        j.service,
        j.price || 0,
        j.done ? 'Completed' : j.skipped ? 'Skipped' : 'Scheduled',
        isPaid(j.id) ? 'Yes' : 'No',
        hrs,
        jExp > 0 ? jExp.toFixed(2) : '',
        dayExp > 0 ? dayExp.toFixed(2) : '',
        j.note || '',
      ]);
    });
  });

  if(rows.length <= 1){
    alert('No jobs to export yet.');
    return;
  }

  closeSheet();
  showToast('Exporting ' + (rows.length-1) + ' jobs…');

  // Apps Script requires form-encoded POST with data in a 'payload' param
  // because no-cors fetch drops the content-type and body gets mangled.
  // Using an invisible form submit + iframe is the most reliable approach.
  const json = JSON.stringify({ rows });
  const encoded = encodeURIComponent(json);

  // Create a hidden iframe to receive the response (avoids CORS popup)
  const iframe = document.createElement('iframe');
  iframe.name = 'export_frame';
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  // Build and submit a hidden form
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = url;
  form.target = 'export_frame';
  form.style.display = 'none';

  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'payload';
  input.value = json;
  form.appendChild(input);

  document.body.appendChild(form);
  form.submit();

  setTimeout(()=>{
    form.remove();
    iframe.remove();
    showToast('✓ Exported to Google Sheets!');
  }, 3000);
}
